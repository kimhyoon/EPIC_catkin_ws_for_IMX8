# EPIC Configuration for ARM Target Board
# Heavily optimized for minimal computational load

# Topic parameters - same as simulation
odometry_topic: /quad_0/lidar_slam/odom
cloud_topic: /quad0_pcl_render_node/cloud

# LiDAR hardware parameters (for simulation compatibility)
quad0_pcl_render_node:
  is_360lidar: 0
  vertical_fov: 42.0
  sensing_horizon: 12
  lidar_pitch: 40.0
  yaw_fov: 360.0

# TSP solver configuration
exploration/tsp_dir: /home/root/catkin_ws/src/EPIC/src/global_planner/utils/lkh_tsp_solver/resource

# Global planning weights
global_planning/w_vdir: 1.2
global_planning/w_yawdir: 0.0
global_planning/w_firstnode: 0.2

# Visualization - disabled for performance on ARM
view_graph: false
FrontierManager/view_cluster: false
FrontierManager/view_frt: false

# Graph parameters - TOPO SKELETON OPTIMIZED
bubble_topo/min_x: 0.7
bubble_topo/min_y: 0.7
bubble_topo/min_z: 0.4
bubble_topo/bubble_min_radius: 0.7
bubble_topo/init_region_size_x: 2.5
bubble_topo/init_region_size_y: 2.5
bubble_topo/init_region_size_z: 2.0
bubble_topo/cube_discrete_size: 0.7
bubble_topo/odom_node_distance: 3.0
bubble_astar/safe_distance: 0.8  #1.0
bubble_astar/allocate_num: 3500  #4000

# Map parameters - TOPO SKELETON OPTIMIZED
max_update_region_num: 32000             # OPTIMIZED: 50000→35000 (faster processing)
frontier/candidate_dphi: 0.30             # Increased from 0.26 (less candidates)
frontier/candidate_znum: 2                # Reduced from 3 (fewer z-levels)

# LiDAR perception - IKD-TREE INSERT OPTIMIZED
lidar_perception/fov_up: 45.0
lidar_perception/fov_down: -7.0
lidar_perception/lidar_pitch: 40.0
lidar_perception/fov_viewpoint_up: 40.0
lidar_perception/fov_viewpoint_down: -8.0
lidar_perception/max_ray_length: 16

# Parallel processing - OPTIMIZED for faster node operations
parallel_astar/update_connection_timeout: 0.005  # OPTIMIZED: 0.008→0.006 (faster timeouts)
parallel_astar/insert_node_timeout: 0.005        # OPTIMIZED: 0.008→0.006 (faster insert)

# Frontier management - optimized for less computation
FrontierManager/cell_size: 0.7
FrontierManager/noise_cell_range: 1
FrontierManager/good_observation_direction_score: 0.8
FrontierManager/good_observation_force_trust_length: 4.0
FrontierManager/good_observation_trust_length: 12.0
FrontierManager/update_length: 8.0 
FrontierManager/cluster_max_size: 6.0
FrontierManager/cluster_min_size: 2.0
FrontierManager/cluster_min_radius: 1.0
FrontierManager/cluster_direction_radius: 0.15
FrontierManager/cluster_minmum_point_num: 4

# Viewpoint sampling - VP INSERT OPTIMIZED
ViewpointManager/sample_pillar_min_height: 1.0
ViewpointManager/sample_pillar_max_height: 3.0
ViewpointManager/sample_pillar_height_layer_num: 3
ViewpointManager/sample_pillar_min_radius: 1.5
ViewpointManager/sample_pillar_max_radius: 3.0
ViewpointManager/sample_pillar_radius_layer_num: 2
ViewpointManager/sample_pillar_circle_sample_num: 4
ViewpointManager/local_tsp_size: 8

# Exploration area
box_num: 1
box_0/down: [-10.0, -6.0, -0.2]
box_0/up: [182.0, 150.2, 3.8]
dead_area_num: 0

# Trajectory parameters - optimized for ARM processing
max_traj_len: 8.0
DilateRadiusSoft: 0.5 # minco threshold
DilateRadiusHard: 0.6 # collision check threshold
MaxCorridorSize: 3.0
MaxVelMag: 3.5 #2.5
maxBdrMag: 1000.0 #6000
MaxTiltAngle: 0.5
MinThrust: 10.0
MaxThrust: 22.0
VehicleMass: 1.9
GravAcc: 9.8
HorizDrag: 0.70
VertDrag: 0.80
ParasDrag: 0.01
SpeedEps: 0.0001
WeightT: 1500.0 #1500.0
WeightSafeT: 300.0

# Weight vector [pos_weight, vel_weight, omg_weight, theta_weight, thrust_weight]
ChiVec: [1.5e+5, 1.0e+4, 8.0e+3, 8.0e+4, 8.0e+4] 
# Reduced all weights 
# 
# [1.5e+5, 1.0e+4, 8.0e+3, 8.0e+4, 8.0e+4] 
# [2.0e+5, 1.5e+4, 1.0e+4, 1.0e+5, 1.0e+5]
SmoothingEps: 0.02
IntegralIntervs: 16
RelCostTol: 1.0e-5 #5.0e-6

# Yaw optimization - reduced complexity
yaw_max_vel: 4.5                     # Reduced from 4.0
yaw_rho_vis: 5000.0                  # Reduced from 10000.0
yaw_time_fwd: 4.0                    # Reduced from 3.0 

# FSM Replan skip windows
fsm/replan_time_after_traj_start: 0.2
fsm/replan_time_before_traj_end: 0.2